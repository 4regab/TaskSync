name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - "tasksync-chat/**"
      - ".github/workflows/auto-release.yml"
      - "!tasksync-chat/package.json" # Prevent infinite loop

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump version')"
    defaults:
      run:
        working-directory: tasksync-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"
          echo "prev_version=$CURRENT" >> $GITHUB_OUTPUT

          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "New version: $NEW_VERSION"

          npm version $NEW_VERSION --no-git-tag-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Get meaningful commit message
        id: commit_info
        run: |
          cd ..
          HEAD_MSG="${{ github.event.head_commit.message }}"

          if [[ "$HEAD_MSG" == Merge* ]]; then
            MEANINGFUL_MSG=$(git log --format=%s --no-merges -1 HEAD^2 2>/dev/null || echo "$HEAD_MSG")
          else
            MEANINGFUL_MSG="$HEAD_MSG"
          fi

          {
            echo "message<<EOF"
            echo "$MEANINGFUL_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          cd ..
          DATE=$(date +%m-%d-%y)
          VERSION="${{ steps.bump.outputs.version }}"

          TEMP_FILE=$(mktemp)
          echo "# Changelog" > $TEMP_FILE
          echo "" >> $TEMP_FILE
          echo "All notable changes to this project will be documented in this file." >> $TEMP_FILE
          echo "" >> $TEMP_FILE
          echo "## TaskSync v$VERSION ($DATE)" >> $TEMP_FILE
          echo '${{ steps.commit_info.outputs.message }}' | while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "- $line" >> $TEMP_FILE
            fi
          done
          echo "" >> $TEMP_FILE
          tail -n +4 CHANGELOG.md >> $TEMP_FILE
          mv $TEMP_FILE CHANGELOG.md

      - name: Create release branch
        id: create_release_branch
        run: |
          cd ..
          BRANCH="chore/release-${{ steps.bump.outputs.version }}"
          git checkout -B "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          cd ..
          git add tasksync-chat/package.json tasksync-chat/package-lock.json CHANGELOG.md
          git commit --no-verify -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"

      - name: Push release branch
        run: |
          cd ..
          git push --set-upstream origin "${{ steps.create_release_branch.outputs.branch }}"

      - name: Open pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const branch = `${{ steps.create_release_branch.outputs.branch }}`;
            const version = `${{ steps.bump.outputs.version }}`;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
            });

            if (existing.data.length) return;

            await github.rest.pulls.create({
              owner,
              repo,
              title: `chore: bump version to ${version}`,
              head: branch,
              base: 'main',
              body: `Automated release prep for TaskSync v${version}.`,
            });

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: vsce package

      - name: Publish to VS Code Marketplace
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: TaskSync v${{ steps.bump.outputs.version }}
          files: tasksync-chat/*.vsix
          generate_release_notes: false
          body: |
            ## TaskSync v${{ steps.bump.outputs.version }}

            ${{ steps.commit_info.outputs.message }}

            ### Install
            - **Marketplace**: [Install TaskSync](https://marketplace.visualstudio.com/items?itemName=4regab.tasksync-chat)
            - **Manual**: Download `.vsix` below → `Extensions: Install from VSIX...`

            **Full Changelog**: https://github.com/4regab/TaskSync/compare/v${{ steps.bump.outputs.prev_version }}...v${{ steps.bump.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: tasksync-chat/*.vsix
