name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - "tasksync-chat/**"
      - ".github/workflows/auto-release.yml"
      - "!tasksync-chat/package.json" # Prevent infinite loop
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  detect_prepare_context:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_prepare: ${{ steps.changes.outputs.should_prepare }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release-only changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "should_prepare=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          printf 'Changed files:\n%s\n' "$CHANGED_FILES"

          SHOULD_PREPARE=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              CHANGELOG.md|tasksync-chat/package.json|tasksync-chat/package-lock.json)
                ;;
              *)
                SHOULD_PREPARE=true
                break
                ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "should_prepare=$SHOULD_PREPARE" >> $GITHUB_OUTPUT

  prepare_release:
    needs: detect_prepare_context
    if: github.event_name == 'push' && needs.detect_prepare_context.outputs.should_prepare == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: tasksync-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute release metadata
        id: release_meta
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          BRANCH="chore/release-$NEW_VERSION"

          echo "New version: $NEW_VERSION"
          echo "Release branch: $BRANCH"

          echo "prev_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Check for existing release branch
        id: branch_check
        run: |
          cd ..
          if git ls-remote --exit-code --heads origin "${{ steps.release_meta.outputs.branch }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice title=Release branch already exists::${{ steps.release_meta.outputs.branch }} already exists on origin. Reusing that branch instead of overwriting it."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: steps.branch_check.outputs.exists != 'true'
        run: |
          npm version ${{ steps.release_meta.outputs.version }} --no-git-tag-version

      - name: Get meaningful commit message
        id: commit_info
        if: steps.branch_check.outputs.exists != 'true'
        run: |
          cd ..
          HEAD_MSG="${{ github.event.head_commit.message }}"

          if [[ "$HEAD_MSG" == Merge* ]]; then
            MEANINGFUL_MSG=$(git log --format=%s --no-merges -1 HEAD^2 2>/dev/null || echo "$HEAD_MSG")
          else
            MEANINGFUL_MSG="$HEAD_MSG"
          fi

          {
            echo "message<<EOF"
            echo "$MEANINGFUL_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        if: steps.branch_check.outputs.exists != 'true'
        run: |
          cd ..
          DATE=$(date +%m-%d-%y)
          VERSION="${{ steps.release_meta.outputs.version }}"

          TEMP_FILE=$(mktemp)
          echo "# Changelog" > $TEMP_FILE
          echo "" >> $TEMP_FILE
          echo "All notable changes to this project will be documented in this file." >> $TEMP_FILE
          echo "" >> $TEMP_FILE
          echo "## TaskSync v$VERSION ($DATE)" >> $TEMP_FILE
          echo '${{ steps.commit_info.outputs.message }}' | while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "- $line" >> $TEMP_FILE
            fi
          done
          echo "" >> $TEMP_FILE
          tail -n +4 CHANGELOG.md >> $TEMP_FILE
          mv $TEMP_FILE CHANGELOG.md

      - name: Create release branch
        if: steps.branch_check.outputs.exists != 'true'
        run: |
          cd ..
          git checkout -b "${{ steps.release_meta.outputs.branch }}"

      - name: Commit version bump
        if: steps.branch_check.outputs.exists != 'true'
        run: |
          cd ..
          git add tasksync-chat/package.json tasksync-chat/package-lock.json CHANGELOG.md
          git commit --no-verify -m "chore: bump version to ${{ steps.release_meta.outputs.version }} [skip ci]"

      - name: Push release branch
        if: steps.branch_check.outputs.exists != 'true'
        run: |
          cd ..
          git push --set-upstream origin "${{ steps.release_meta.outputs.branch }}"

      - name: Open or reuse pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const branch = `${{ steps.release_meta.outputs.branch }}`;
            const version = `${{ steps.release_meta.outputs.version }}`;
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
            });

            if (existing.data.length) {
              core.notice(`Release PR already open: ${existing.data[0].html_url}`);
              return;
            }

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title: `chore: bump version to ${version}`,
                head: branch,
                base: 'main',
                body: `Automated release prep for TaskSync v${version}.`,
              });

              core.notice(`Created release PR: ${created.data.html_url}`);
            } catch (error) {
              const msg = String(error?.response?.data?.message || error?.message || "");
              const blocked = error?.status === 403 && msg.includes("GitHub Actions is not permitted to create or approve pull requests.");
              if (!blocked) throw error;

              const compareUrl = `https://github.com/${owner}/${repo}/compare/main...${branch}?expand=1`;
              core.warning("Skipping automatic PR creation: repository settings block GitHub Actions from creating PRs.");
              core.notice(`Create the release PR manually: ${compareUrl}`);
            }

  publish_release:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'chore/release-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: tasksync-chat
    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tasksync-chat/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Read release metadata
        id: release_meta
        run: |
          cd ..
          VERSION=$(node -p "require('./tasksync-chat/package.json').version")
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | head -n 1 || true)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          if [ -n "$PREV_TAG" ]; then
            echo "compare_url=https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...v$VERSION" >> $GITHUB_OUTPUT
          else
            echo "compare_url=" >> $GITHUB_OUTPUT
          fi

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: vsce package

      - name: Compose release notes
        id: release_notes
        run: |
          COMPARE_URL="${{ steps.release_meta.outputs.compare_url }}"
          BODY_FILE=$(mktemp)

          {
            echo "## TaskSync v${{ steps.release_meta.outputs.version }}"
            echo
            echo "Released from merged PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            echo
            echo "### Install"
            echo "- **Marketplace**: [Install TaskSync](https://marketplace.visualstudio.com/items?itemName=4regab.tasksync-chat)"
            echo "- **Manual**: Download \`.vsix\` below -> \`Extensions: Install from VSIX...\`"

            if [ -n "$COMPARE_URL" ]; then
              echo
              echo "**Full Changelog**: $COMPARE_URL"
            fi
          } > "$BODY_FILE"

          {
            echo "body<<EOF"
            cat "$BODY_FILE"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          name: TaskSync v${{ steps.release_meta.outputs.version }}
          files: tasksync-chat/*.vsix
          generate_release_notes: false
          body: ${{ steps.release_notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: tasksync-chat/*.vsix
